<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nayla's Retro Dimension 📺✨</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-purple: #bc13fe;
            --neon-pink: #ff00ff;
            --bg-dark: #0d0221;
        }

        body {
            margin: 0;
            background: var(--bg-dark);
            color: #00ff41; /* Hijau Monitor Tua */
            font-family: 'VT323', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Scanlines Effect */
        body::after {
            content: " ";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            background-size: 100% 2px, 3px 100%;
            z-index: 100;
            pointer-events: none;
        }

        /* Retro TV Container */
        .tv-frame {
            width: 320px;
            height: 280px;
            background: #4a4a4a;
            border: 10px solid #222;
            border-radius: 40px;
            position: relative;
            box-shadow: 0 0 50px rgba(188, 19, 254, 0.3);
            display: flex;
            padding: 20px;
        }

        /* Layar TV */
        #screen {
            width: 80%;
            height: 100%;
            background: #111;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            border: 4px solid #333;
        }

        #screen img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: contrast(1.2) brightness(1.1) sepia(0.3);
            opacity: 0.8;
            transition: 0.1s;
        }

        /* Static/Noisy Effect */
        .noise {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://media.giphy.com/media/oEI9uWUicKgR2/giphy.gif');
            opacity: 0.1;
            display: none;
            z-index: 5;
        }

        /* Controls (Tombol TV) */
        .controls {
            width: 20%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            padding-left: 10px;
        }

        .knob {
            width: 35px;
            height: 35px;
            background: #222;
            border-radius: 50%;
            border: 2px solid #666;
            cursor: pointer;
            position: relative;
        }

        .knob::after {
            content: '';
            position: absolute;
            width: 4px; height: 15px;
            background: #ff00ff;
            left: 50%; top: 5px;
            transform: translateX(-50%);
        }

        .btn-switch {
            width: 30px;
            height: 15px;
            background: #ff00ff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 0 10px #ff00ff;
        }

        /* Teks Status */
        .status-panel {
            margin-top: 30px;
            text-align: center;
            max-width: 300px;
        }

        .typing {
            overflow: hidden;
            white-space: nowrap;
            border-right: .15em solid #ff00ff;
            animation: typing 3.5s steps(40, end), blink-caret .75s step-end infinite;
        }

        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: #ff00ff; } }
    </style>
</head>
<body>

<div style="margin-bottom: 20px; color: var(--neon-pink); font-size: 24px;">CHANNEL: NAYLA-TV-01</div>

<div class="tv-frame">
    <div id="screen">
        <div class="noise" id="noise"></div>
        <img id="tv-img" src="foto1.jpg">
    </div>
    <div class="controls">
        <div class="knob" id="knob" onclick="changeChannel()"></div>
        <div class="knob" style="transform: rotate(90deg);" onclick="changeChannel()"></div>
        <button class="btn-switch" onclick="togglePower()"></button>
    </div>
</div>

<div class="status-panel">
    <p id="msg-text" class="typing">> Mencari sinyal kasih sayang...</p>
    <p style="font-size: 14px; color: #666;">Putar tombol untuk ganti kenangan</p>
</div>

<audio id="bgm" src="bestparpart.m4a" loop></audio>
<audio id="static-sfx" src="surprise.mp3"></audio> <audio id="v1" src="bintang1.m4a"></audio>
<audio id="v2" src="bintang2.m4a"></audio>
<audio id="v3" src="bintang3.m4a"></audio>
<audio id="v4" src="bintang4.m4a"></audio>
<audio id="v5" src="bintang5.m4a"></audio>

<script>
    const images = [
        'foto1.jpg', 'foto2.jpg', 'foto3.jpg', 
        'k1.JPG', 'k2.JPG', 'k3.JPG', 'k4.jpg', 'k5.JPG', 'k6.jpg', 'k7.jpg', 'k8.jpg', 
        'k9.JPG', 'k10.jpg', 'k11.JPG', 'k12.JPG', 'k13.JPG', 'k14.JPG', 'k15.JPG', 
        'k16.JPG', 'k17.jpg', 'k18.JPG', 'k19.JPG', 'k20.JPG', 'k21.JPG', 'k22.jpg', 'k23.jpg'
    ];

    const messages = [
        "> Sinyal terdeteksi: Sangat Cantik",
        "> Decoding memory chip #99...",
        "> Frekuensi rindu: 102.5 FM",
        "> Transmisi dari masa lalu...",
        "> Error: Terlalu sayang untuk dihapus",
        "> Nayla Multiverse sedang berjalan..."
    ];

    let isPowerOn = true;
    const imgEl = document.getElementById('tv-img');
    const noise = document.getElementById('noise');
    const msgText = document.getElementById('msg-text');
    const knob = document.getElementById('knob');
    const bgm = document.getElementById('bgm');

    function changeChannel() {
        if (!isPowerOn) return;

        // Efek Suara & Visual Statis (Kresek)
        document.getElementById('static-sfx').play();
        noise.style.display = 'block';
        knob.style.transform += 'rotate(45deg)';
        bgm.play().catch(e => {});

        setTimeout(() => {
            noise.style.display = 'none';
            
            // Pilih Foto, Teks, & VN Random
            const randomImg = images[Math.floor(Math.random() * images.length)];
            const randomMsg = messages[Math.floor(Math.random() * messages.length)];
            const vNum = Math.floor(Math.random() * 5) + 1;

            imgEl.src = randomImg;
            msgText.innerText = randomMsg;
            
            // Play VN
            const sound = document.getElementById('v' + vNum);
            sound.currentTime = 0;
            sound.play();

            // Efek Glitch Visual sebentar
            imgEl.style.filter = `hue-rotate(${Math.random()*360}deg) contrast(1.5)`;
            setTimeout(() => {
                imgEl.style.filter = "contrast(1.2) brightness(1.1) sepia(0.3)";
            }, 200);

        }, 500);
    }

    function togglePower() {
        isPowerOn = !isPowerOn;
        if (!isPowerOn) {
            imgEl.style.display = 'none';
            msgText.innerText = "> SYSTEM OFF";
            bgm.pause();
        } else {
            imgEl.style.display = 'block';
            changeChannel();
        }
    }
</script>

</body>
</html>
