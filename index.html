<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nayla's Gacha Chaos! 🎰✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Varela+Round&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: #ffecb3; /* Kuning ceria */
            font-family: 'Varela Round', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            perspective: 1000px;
        }

        /* Dekorasi background yang gerak-gerak */
        .bg-dots {
            position: fixed;
            width: 100%; height: 100%;
            background-image: radial-gradient(#ff8a65 2px, transparent 2px);
            background-size: 30px 30px;
            z-index: -1;
            opacity: 0.3;
            animation: moveBg 10s linear infinite;
        }

        @keyframes moveBg {
            from { background-position: 0 0; }
            to { background-position: 100px 100px; }
        }

        /* Mesin Gacha Utama */
        #gacha-machine {
            width: 280px;
            height: 380px;
            background: #ff5252; /* Merah mesin */
            border: 8px solid #333;
            border-radius: 40px 40px 20px 20px;
            position: relative;
            box-shadow: 15px 15px 0px #d32f2f;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        /* Kaca Atas isi bola-bola */
        .glass-dome {
            width: 80%;
            height: 50%;
            background: #e3f2fd;
            border: 6px solid #333;
            border-radius: 30px;
            margin-top: 20px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: center;
            padding: 5px;
        }

        .mini-ball {
            width: 30px; height: 30px;
            border-radius: 50%;
            margin: 2px;
            border: 2px solid #333;
        }

        /* Tombol Putar */
        .crank {
            width: 80px; height: 80px;
            background: #ffeb3b;
            border: 6px solid #333;
            border-radius: 50%;
            margin-top: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Bungee', cursive;
            transition: 0.2s;
            user-select: none;
        }

        .crank:hover { transform: rotate(45deg) scale(1.1); }
        .crank:active { transform: rotate(180deg); }

        /* Hasil Gacha yang Keluar */
        .capsule-result {
            position: absolute;
            width: 200px;
            height: 250px;
            background: white;
            border: 6px solid #333;
            border-radius: 20px;
            z-index: 100;
            padding: 10px;
            text-align: center;
            box-shadow: 20px 20px 0px rgba(0,0,0,0.1);
            display: none;
            animation: capsulePop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes capsulePop {
            0% { transform: scale(0) rotate(-20deg) translate(-50%, -50%); opacity: 0; top: 80%; left: 50%; }
            100% { transform: scale(1) rotate(5deg) translate(-50%, -50%); opacity: 1; top: 40%; left: 50%; }
        }

        .capsule-result img {
            width: 100%; height: 180px;
            object-fit: cover;
            border-radius: 10px;
            border: 3px solid #333;
        }

        /* Getaran Mesin */
        .shake { animation: shake 0.2s infinite; }
        @keyframes shake {
            0% { transform: translate(2px, 2px); }
            50% { transform: translate(-2px, -2px); }
            100% { transform: translate(2px, -2px); }
        }

        #msg-bubble {
            background: white;
            padding: 15px;
            border-radius: 20px;
            border: 4px solid #333;
            margin-bottom: 20px;
            font-weight: bold;
            position: relative;
        }

        #msg-bubble::after {
            content: '';
            position: absolute;
            bottom: -20px; left: 50%;
            border: 10px solid transparent;
            border-top-color: #333;
        }

        .close-btn {
            background: #333; color: white;
            border: none; padding: 5px 15px;
            margin-top: 10px; border-radius: 10px;
            cursor: pointer; font-family: 'Bungee';
        }
    </style>
</head>
<body>

<div class="bg-dots"></div>

<div id="msg-bubble">AYO PENCET! DAPET APA YA? 🤔</div>

<div id="gacha-machine">
    <div class="glass-dome" id="dome">
        <div class="mini-ball" style="background:#ff80ab"></div>
        <div class="mini-ball" style="background:#80d8ff"></div>
        <div class="mini-ball" style="background:#ccff90"></div>
        <div class="mini-ball" style="background:#ffff8d"></div>
        <div class="mini-ball" style="background:#ff80ab"></div>
        <div class="mini-ball" style="background:#80d8ff"></div>
        <div class="mini-ball" style="background:#ccff90"></div>
        <div class="mini-ball" style="background:#ffff8d"></div>
    </div>
    <div class="crank" onclick="spinGacha()">PUSH</div>
    <div style="margin-top:20px; font-family:'Bungee'; color:white; font-size:12px;">NAYLA EDITION</div>
</div>

<div id="result" class="capsule-result">
    <img id="res-img" src="">
    <div id="res-text" style="margin-top:10px; font-weight:bold; font-size:12px;"></div>
    <button class="close-btn" onclick="closeResult()">OK!</button>
</div>

<audio id="bgm" src="bestparpart.m4a" loop></audio>
<audio id="sfx-spin" src="surprise.mp3"></audio>
<audio id="v1" src="bintang1.m4a"></audio>
<audio id="v2" src="bintang2.m4a"></audio>
<audio id="v3" src="bintang3.m4a"></audio>
<audio id="v4" src="bintang4.m4a"></audio>
<audio id="v5" src="bintang5.m4a"></audio>

<script>
    const images = [
        'foto1.jpg', 'foto2.jpg', 'foto3.jpg', 
        'k1.JPG', 'k2.JPG', 'k3.JPG', 'k4.jpg', 'k5.JPG', 'k6.jpg', 'k7.jpg', 'k8.jpg', 
        'k9.JPG', 'k10.jpg', 'k11.JPG', 'k12.JPG', 'k13.JPG', 'k14.JPG', 'k15.JPG', 
        'k16.JPG', 'k17.jpg', 'k18.JPG', 'k19.JPG', 'k20.JPG', 'k21.JPG', 'k22.jpg', 'k23.jpg'
    ];

    const funnyTexts = [
        "CIHUY! FOTO SIAPA INI?",
        "DAPET JACKPOT NAYLA! 💎",
        "MEMORI TER-GOKIL NIH!",
        "AWAS, FOTONYA TERLALU CANTIK!",
        "KAPSULNYA ISI KENANGAN.. CIE.",
        "MESINNYA CAPEK, TAPI KAMU KEREN!"
    ];

    let isSpinning = false;
    const machine = document.getElementById('gacha-machine');
    const resultDiv = document.getElementById('result');
    const bgm = document.getElementById('bgm');

    function spinGacha() {
        if (isSpinning) return;
        isSpinning = true;

        // Start BGM if first time
        bgm.play().catch(e => {});

        // Efek Mesin Getar
        machine.classList.add('shake');
        document.getElementById('sfx-spin').play();
        document.getElementById('msg-bubble').innerText = "LAGI DIPROSES... 😵‍💫";

        setTimeout(() => {
            machine.classList.remove('shake');
            showResult();
        }, 1500);
    }

    function showResult() {
        // Ambil data random
        const randomImg = images[Math.floor(Math.random() * images.length)];
        const randomText = funnyTexts[Math.floor(Math.random() * funnyTexts.length)];
        const randomVoice = Math.floor(Math.random() * 5) + 1;

        // Set konten
        document.getElementById('res-img').src = randomImg;
        document.getElementById('res-text').innerText = randomText;
        resultDiv.style.display = 'block';

        // Mainin suara VN
        const vn = document.getElementById('v' + randomVoice);
        vn.currentTime = 0;
        vn.play();

        document.getElementById('msg-bubble').innerText = "NAH, DAPET KAN!";
    }

    function closeResult() {
        resultDiv.style.animation = 'capsulePop 0.3s reverse forwards';
        setTimeout(() => {
            resultDiv.style.display = 'none';
            resultDiv.style.animation = 'capsulePop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards';
            isSpinning = false;
            document.getElementById('msg-bubble').innerText = "COBA LAGI? PENCET LAGI!";
        }, 300);
    }

    // Bola hiasan gerak random dikit biar idup
    setInterval(() => {
        const balls = document.querySelectorAll('.mini-ball');
        balls.forEach(b => {
            b.style.transform = `translate(${Math.random()*5}px, ${Math.random()*5}px)`;
        });
    }, 100);
</script>

</body>
</html>
