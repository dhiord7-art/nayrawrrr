<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nayla Adventure: Memory Catcher 🕹️</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-pink: #ff00ff;
            --neon-blue: #00ffff;
            --neon-green: #39ff14;
        }

        body {
            margin: 0;
            background: #121212;
            font-family: 'Press Start 2P', cursive;
            color: white;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #game-ui {
            position: fixed;
            top: 20px;
            width: 90%;
            display: flex;
            justify-content: space-between;
            z-index: 100;
            font-size: 12px;
            pointer-events: none;
        }

        .score-box { color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green); }

        #start-screen {
            text-align: center;
            z-index: 200;
            background: rgba(0,0,0,0.9);
            padding: 40px;
            border: 4px double var(--neon-blue);
        }

        .btn-start {
            background: var(--neon-pink);
            color: white;
            border: none;
            padding: 20px 40px;
            font-family: 'Press Start 2P';
            cursor: pointer;
            margin-top: 30px;
            box-shadow: 5px 5px 0px white;
        }

        .btn-start:hover { transform: scale(1.1); box-shadow: 8px 8px 0px var(--neon-blue); }

        /* Gaya item yang jatuh */
        .drop-item {
            position: absolute;
            cursor: pointer;
            border: 3px solid white;
            box-shadow: 0 0 15px rgba(255,255,255,0.5);
            transition: transform 0.1s;
            user-select: none;
        }

        .drop-item:active { transform: scale(0.8); }

        /* Efek Ledakan saat diklik */
        .pop-effect {
            position: absolute;
            color: var(--neon-pink);
            font-size: 14px;
            pointer-events: none;
            animation: floatUp 0.5s forwards;
        }

        @keyframes floatUp {
            to { transform: translateY(-50px); opacity: 0; }
        }

        #final-message {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            color: black;
            padding: 20px;
            display: none;
            z-index: 300;
            text-align: center;
            width: 80%;
        }
    </style>
</head>
<body>

<div id="game-ui">
    <div class="score-box">MEMORIES: <span id="score">0</span></div>
    <div style="color: var(--neon-pink)">LEVEL: HARDCORE</div>
</div>

<div id="start-screen">
    <h1 style="color: var(--neon-blue); margin-bottom: 20px;">NAYLA CATCHER</h1>
    <p style="font-size: 10px; line-height: 2;">Tangkap semua kenangan yang jatuh!<br>Setiap klik bakal ada suaranya.<br>Hati-hati, makin lama makin cepet!</p>
    <button class="btn-start" onclick="startGame()">START GAME</button>
</div>

<div id="final-message">
    <h2 id="final-title"></h2>
    <p id="final-text"></p>
    <button onclick="location.reload()" style="font-family:'Press Start 2P'; padding:10px; margin-top:10px;">MAIN LAGI?</button>
</div>

<audio id="bgm" src="bestparpart.m4a" loop></audio>
<audio id="v1" src="bintang1.m4a"></audio>
<audio id="v2" src="bintang2.m4a"></audio>
<audio id="v3" src="bintang3.m4a"></audio>
<audio id="v4" src="bintang4.m4a"></audio>
<audio id="v5" src="bintang5.m4a"></audio>

<script>
    const images = [
        'foto1.jpg', 'foto2.jpg', 'foto3.jpg', 
        'k1.JPG', 'k2.JPG', 'k3.JPG', 'k4.jpg', 'k5.JPG', 'k6.jpg', 'k7.jpg', 'k8.jpg', 
        'k9.JPG', 'k10.jpg', 'k11.JPG', 'k12.JPG', 'k13.JPG', 'k14.JPG', 'k15.JPG', 
        'k16.JPG', 'k17.jpg', 'k18.JPG', 'k19.JPG', 'k20.JPG', 'k21.JPG', 'k22.jpg', 'k23.jpg'
    ];

    let score = 0;
    let gameActive = false;
    let dropSpeed = 3000; // milidetik
    let spawnRate = 1000;

    function startGame() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('bgm').play();
        gameActive = true;
        gameLoop();
    }

    function gameLoop() {
        if (!gameActive) return;

        createItem();
        
        // Semakin tinggi skor, semakin cepat munculnya
        let nextSpawn = Math.max(400, spawnRate - (score * 20));
        setTimeout(gameLoop, nextSpawn);
    }

    function createItem() {
        const item = document.createElement('img');
        const randomImg = images[Math.floor(Math.random() * images.length)];
        
        item.src = randomImg;
        item.className = 'drop-item';
        
        // Ukuran acak
        const size = Math.floor(Math.random() * 60) + 70;
        item.style.width = size + 'px';
        item.style.height = size + 'px';
        item.style.objectFit = 'cover';
        item.style.borderRadius = (Math.random() > 0.5 ? '50%' : '8px');

        // Posisi Horizontal acak
        item.style.left = Math.random() * (window.innerWidth - size) + 'px';
        item.style.top = '-100px';

        document.body.appendChild(item);

        // Animasi Jatuh
        let pos = -100;
        let speed = Math.random() * 2 + 2 + (score / 10); // Makin lama makin cepet jatuhnya
        
        const fall = setInterval(() => {
            if (!gameActive) {
                clearInterval(fall);
                item.remove();
                return;
            }

            pos += speed;
            item.style.top = pos + 'px';

            if (pos > window.innerHeight) {
                clearInterval(fall);
                item.remove();
                // Kalau jatuh sampai bawah, game over atau kurangi nyawa? 
                // Kita buat santai aja, tapi kalau skor sudah 50 muncul pesan sukses
                if (score >= 50) endGame("MISSION COMPLETE!", "Kamu hebat banget nangkap semua memorinya! Nayla emang jagonya. 🏆");
            }
        }, 10);

        // Klik Item
        item.onclick = () => {
            score++;
            document.getElementById('score').innerText = score;
            
            // Putar Suara Acak
            const vIndex = Math.floor(Math.random() * 5) + 1;
            const sound = document.getElementById('v' + vIndex);
            sound.currentTime = 0;
            sound.play();

            // Efek Pop
            const pop = document.createElement('div');
            pop.className = 'pop-effect';
            pop.innerText = '+1 LOVE';
            pop.style.left = item.style.left;
            pop.style.top = item.style.top;
            document.body.appendChild(pop);
            setTimeout(() => pop.remove(), 500);

            clearInterval(fall);
            item.remove();

            if (score === 15) {
                // Interupsi teks kecil
                console.log("Keep going, Nanay!");
            }
        };
    }

    function endGame(title, text) {
        gameActive = false;
        const msg = document.getElementById('final-message');
        document.getElementById('final-title').innerText = title;
        document.getElementById('final-text').innerText = text;
        msg.style.display = 'block';
        document.getElementById('bgm').pause();
    }
</script>

</body>
</html>
