<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nayla's Multiverse 🌌</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: #050505;
            color: #00ff41; /* Matrix/Cyberpunk Green */
            font-family: 'Space Mono', monospace;
            overflow: hidden;
            height: 100vh;
            cursor: crosshair;
        }

        /* Scanline effect untuk kesan absurd/retro */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 100;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        #entry-point {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 200;
            text-align: center;
        }

        .glitch {
            font-size: 3rem;
            font-weight: bold;
            text-transform: uppercase;
            position: relative;
            text-shadow: 0.05em 0 0 rgba(255,0,0,.75), -0.025em -0.05em 0 rgba(0,255,0,.75), 0.025em 0.05em 0 rgba(0,0,255,.75);
            animation: glitch 500ms infinite;
        }

        @keyframes glitch {
            0% { text-shadow: 0.05em 0 0 rgba(255,0,0,.75), -0.05em -0.025em 0 rgba(0,255,0,.75); }
            50% { text-shadow: -0.05em -0.025em 0 rgba(255,0,0,.75), 0.025em 0.025em 0 rgba(0,255,0,.75); }
            100% { text-shadow: -0.025em 0 0 rgba(255,0,0,.75), -0.025em -0.05em 0 rgba(0,255,0,.75); }
        }

        .orbit-container {
            position: absolute;
            width: 100%; height: 100%;
            display: none;
        }

        /* Element yang melayang-layang secara acak */
        .floating-asset {
            position: absolute;
            border: 2px solid #00ff41;
            filter: drop-shadow(0 0 10px #00ff41);
            transition: 0.3s;
            cursor: pointer;
            z-index: 10;
        }

        .floating-asset:hover {
            transform: scale(1.5) rotate(10deg);
            z-index: 100;
            filter: hue-rotate(90deg) brightness(1.5);
        }

        img.floating-asset { width: 100px; height: 100px; object-fit: cover; border-radius: 50%; }
        video.floating-asset { width: 150px; border-radius: 10px; }

        .terminal-text {
            position: fixed;
            bottom: 20px; left: 20px;
            font-size: 12px;
            z-index: 50;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-left: 3px solid #ff00ff;
        }

        button {
            background: none;
            color: #ff00ff;
            border: 2px solid #ff00ff;
            padding: 10px 20px;
            font-family: 'Space Mono';
            cursor: pointer;
            margin-top: 20px;
        }

        button:hover {
            background: #ff00ff;
            color: white;
            box-shadow: 0 0 20px #ff00ff;
        }

        /* Star background */
        #stars { position: fixed; top: 0; left: 0; z-index: 0; }
    </style>
</head>
<body>

<canvas id="stars"></canvas>

<div id="entry-point">
    <h1 class="glitch">SYSTEM DETECTED: NAYLA</h1>
    <p>> Error: Too much cuteness found <br> > Status: System Overload</p>
    <button onclick="launchMultiverse()">INITIALIZE LAUNCH</button>
</div>

<div class="orbit-container" id="multiverse">
    </div>

<div class="terminal-text" id="log">
    [SYSTEM LOG]: Waiting for interaction...
</div>

<audio id="bgm" src="bestparpart.m4a" loop></audio>
<audio id="v1" src="bintang1.m4a"></audio>
<audio id="v2" src="bintang2.m4a"></audio>
<audio id="v3" src="bintang3.m4a"></audio>
<audio id="v4" src="bintang4.m4a"></audio>
<audio id="v5" src="bintang5.m4a"></audio>

<script>
    const assets = [
        'foto1.jpg', 'foto2.jpg', 'foto3.jpg', 
        'k1.JPG', 'k2.JPG', 'k3.JPG', 'k4.jpg', 'k5.JPG', 'k6.jpg', 'k7.jpg', 'k8.jpg', 
        'k9.JPG', 'k10.jpg', 'k11.JPG', 'k12.JPG', 'k13.JPG', 'k14.JPG', 'k15.JPG', 
        'k16.JPG', 'k17.jpg', 'k18.JPG', 'k19.JPG', 'k20.JPG', 'k21.JPG', 'k22.jpg', 'k23.jpg'
    ];

    function launchMultiverse() {
        document.getElementById('entry-point').style.display = 'none';
        document.getElementById('multiverse').style.display = 'block';
        document.getElementById('bgm').play();
        generateAssets();
        logMessage("MULTIVERSE STABILIZED. WELCOME HOME, PRINCESS.");
    }

    function logMessage(msg) {
        const log = document.getElementById('log');
        log.innerHTML = `[SYSTEM LOG]: ${msg}`;
    }

    function generateAssets() {
        const container = document.getElementById('multiverse');
        
        // Sebarkan Gambar
        assets.forEach((src, index) => {
            const img = document.createElement('img');
            img.src = src;
            img.className = 'floating-asset';
            randomizePosition(img);
            img.onclick = () => {
                const voice = Math.floor(Math.random() * 5) + 1;
                document.getElementById('v' + voice).play();
                logMessage(`Accessing Memory Chunk_${index}... Result: Pure Joy.`);
            };
            container.appendChild(img);
            animateFloating(img);
        });

        // Masukkan Video
        const vid = document.createElement('video');
        vid.src = 'video1.mp4';
        vid.className = 'floating-asset';
        vid.autoplay = true;
        vid.loop = true;
        vid.muted = true;
        randomizePosition(vid);
        vid.onmouseover = () => { vid.muted = false; logMessage("Video Stream Decrypted."); };
        vid.onmouseout = () => { vid.muted = true; };
        container.appendChild(vid);
        animateFloating(vid);
    }

    function randomizePosition(el) {
        el.style.top = Math.random() * 80 + 10 + "%";
        el.style.left = Math.random() * 80 + 10 + "%";
    }

    function animateFloating(el) {
        let x = Math.random() * 2 - 1;
        let y = Math.random() * 2 - 1;
        
        setInterval(() => {
            let top = parseFloat(el.style.top);
            let left = parseFloat(el.style.left);
            
            if (top <= 0 || top >= 95) y *= -1;
            if (left <= 0 || left >= 95) x *= -1;
            
            el.style.top = (top + y * 0.2) + "%";
            el.style.left = (left + x * 0.2) + "%";
        }, 30);
    }

    // Canvas Background logic
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    function drawStars() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#ffffff";
        for (let i = 0; i < 100; i++) {
            ctx.beginPath();
            ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, Math.random() * 2, 0, Math.PI * 2);
            ctx.fill();
        }
    }
    setInterval(drawStars, 100);

    logMessage("Initializing core components...");
</script>

</body>
</html>
