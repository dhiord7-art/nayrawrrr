<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nayla's Pop-Up World 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink-soft: #ffdde1;
            --blue-soft: #ee9ca7;
            --text-color: #884d54;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(to bottom, #ffdee9, #b5fffc);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-color);
        }

        /* Header UI */
        #ui-layer {
            margin-top: 20px;
            text-align: center;
            z-index: 10;
        }

        .score-board {
            background: white;
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
            border: 3px solid var(--pink-soft);
        }

        /* Game Area */
        #game-container {
            position: relative;
            width: 100%;
            flex-grow: 1;
            margin: 20px;
        }

        /* Bubble Style */
        .bubble {
            position: absolute;
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            transition: transform 0.2s;
        }

        .bubble img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .bubble:active {
            transform: scale(0.8);
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes popOut {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0); opacity: 0; }
        }

        /* Overlay & Start Button */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(5px);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .start-btn {
            background: var(--blue-soft);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 18px;
            font-family: 'Quicksand', sans-serif;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(238, 156, 167, 0.4);
            transition: 0.3s;
        }

        .start-btn:hover { transform: translateY(-5px); }

        /* Floating decoration */
        .deco { position: fixed; font-size: 24px; opacity: 0.5; z-index: 1; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="score-board">Pop Count: <span id="score">0</span> 🌸</div>
    <p style="font-size: 14px; margin-top: 5px;">Cari fotonya dan klik yaa!</p>
</div>

<div id="game-container"></div>

<div id="overlay">
    <h1 style="font-size: 28px;">Nayla's Pop-Up 🎀</h1>
    <p style="text-align: center; padding: 0 20px;">Klik setiap foto yang muncul buat dengerin suaranya!</p>
    <button class="start-btn" onclick="startGame()">Mulai Main!</button>
</div>

<audio id="bgm" src="bestparpart.m4a" loop></audio>
<audio id="v1" src="bintang1.m4a"></audio>
<audio id="v2" src="bintang2.m4a"></audio>
<audio id="v3" src="bintang3.m4a"></audio>
<audio id="v4" src="bintang4.m4a"></audio>
<audio id="v5" src="bintang5.m4a"></audio>

<script>
    const images = [
        'foto1.jpg', 'foto2.jpg', 'foto3.jpg', 
        'k1.JPG', 'k2.JPG', 'k3.JPG', 'k4.jpg', 'k5.JPG', 'k6.jpg', 'k7.jpg', 'k8.jpg', 
        'k9.JPG', 'k10.jpg', 'k11.JPG', 'k12.JPG', 'k13.JPG', 'k14.JPG', 'k15.JPG', 
        'k16.JPG', 'k17.jpg', 'k18.JPG', 'k19.JPG', 'k20.JPG', 'k21.JPG', 'k22.jpg', 'k23.jpg'
    ];

    let score = 0;
    const container = document.getElementById('game-container');

    function startGame() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('bgm').play();
        spawnPopUp();
        addDecoration();
    }

    function spawnPopUp() {
        // Membuat bubble baru
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        
        // Pilih gambar acak
        const img = document.createElement('img');
        img.src = images[Math.floor(Math.random() * images.length)];
        bubble.appendChild(img);

        // Posisi acak (pastikan tidak keluar layar)
        const x = Math.random() * (window.innerWidth - 120);
        const y = Math.random() * (container.offsetHeight - 120);
        bubble.style.left = x + 'px';
        bubble.style.top = y + 'px';

        container.appendChild(bubble);

        // Menghilang otomatis setelah 2 detik kalau tidak diklik
        const autoRemove = setTimeout(() => {
            if(bubble.parentElement) {
                bubble.style.animation = 'popOut 0.3s forwards';
                setTimeout(() => bubble.remove(), 300);
            }
        }, 2000);

        // Saat diklik
        bubble.onclick = () => {
            clearTimeout(autoRemove);
            score++;
            document.getElementById('score').innerText = score;

            // Suara acak
            const vNum = Math.floor(Math.random() * 5) + 1;
            const sound = document.getElementById('v' + vNum);
            sound.currentTime = 0;
            sound.play();

            bubble.style.animation = 'popOut 0.2s forwards';
            setTimeout(() => bubble.remove(), 200);
        };

        // Atur kecepatan kemunculan berikutnya (makin lama makin dikit jedanya)
        let nextSpawn = Math.max(600, 1200 - (score * 10));
        setTimeout(spawnPopUp, nextSpawn);
    }

    function addDecoration() {
        const emojis = ['✨', '☁️', '💖', '🍀', '🍓'];
        setInterval(() => {
            const d = document.createElement('div');
            d.className = 'deco';
            d.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            d.style.left = Math.random() * 100 + 'vw';
            d.style.top = Math.random() * 100 + 'vh';
            document.body.appendChild(d);
            setTimeout(() => d.remove(), 3000);
        }, 1000);
    }
</script>

</body>
</html>
