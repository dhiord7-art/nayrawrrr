<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nayla's Polaroid Wall ✨💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #fdf6f0; /* Cream hangat */
            font-family: 'Quicksand', sans-serif;
            color: #5d4037;
            overflow-x: hidden; /* Mencegah scroll horizontal */
        }

        .header {
            text-align: center;
            padding: 60px 20px;
            background: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .header h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            margin: 0;
            color: #d4a373;
        }

        .header p {
            font-style: italic;
            font-size: 1.1rem;
            color: #a98467;
            margin-top: 10px;
        }

        /* Container Utama Dinding Foto */
        .photo-wall {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Gaya Polaroid */
        .polaroid {
            background: white;
            padding: 10px 10px 30px 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            border-radius: 2px;
            cursor: pointer;
            transition: 0.3s ease;
            width: 150px; /* Ukuran compact agar muat banyak */
            position: relative;
        }

        .polaroid img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border: 1px solid #eee;
        }

        .polaroid:hover {
            transform: scale(1.05) rotate(0deg) !important;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            z-index: 10;
        }

        /* Gaya Teks Bahasa Inggris di sela-sela foto */
        .quote-card {
            background: #fefae0;
            padding: 20px;
            border-radius: 15px;
            border: 2px dashed #d4a373;
            text-align: center;
            font-style: italic;
            color: #a98467;
            width: 100%;
            max-width: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 10px;
        }

        /* Animasi Hati Betebaran */
        .heart {
            position: fixed;
            font-size: 20px;
            color: #ff80ab;
            pointer-events: none;
            z-index: 1000;
            animation: flutter 2s linear forwards;
        }

        @keyframes flutter {
            0% { transform: translateY(0) translateX(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100vh) translateX(100px) scale(0.5); opacity: 0; }
        }

        .footer {
            text-align: center;
            padding: 40px;
            font-size: 0.9rem;
            color: #bc9c82;
            background: white;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>For My Favorite Person</h1>
        <p>Scroll down to see our memories, click a photo for a surprise...</p>
    </div>

    <div class="photo-wall" id="wall">
        <script>
            const images = [
                'foto1.jpg', 'foto2.jpg', 'foto3.jpg', 
                'k1.JPG', 'k2.JPG', 'k3.JPG', 'k4.jpg', 'k5.JPG', 'k6.jpg', 'k7.jpg', 'k8.jpg', 
                'k9.JPG', 'k10.jpg', 'k11.JPG', 'k12.JPG', 'k13.JPG', 'k14.JPG', 'k15.JPG', 
                'k16.JPG', 'k17.jpg', 'k18.JPG', 'k19.JPG', 'k20.JPG', 'k21.JPG', 'k22.jpg', 'k23.jpg'
            ];

            const quotes = [
                "You’re the UI I'd love to login into every day. 📱❤️",
                "You make my heart do a little 'database commit' every time you smile.",
                "In a room full of art, I'd still stare at you.",
                "If cute was a crime, you'd be serving a life sentence! 😉",
                "I'm not a photographer, but I can totally picture us together forever.",
                "You're like my favorite song on repeat—I never get tired of you."
            ];

            const wall = document.getElementById('wall');

            // Fungsi untuk mengacak urutan array
            function shuffle(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
                return array;
            }

            const shuffledImages = shuffle(images);

            // Masukkan foto dan quote secara bergantian
            shuffledImages.forEach((src, index) => {
                // Buat Polaroid
                const polaroid = document.createElement('div');
                polaroid.className = 'polaroid';
                
                // Rotasi acak sedikit biar estetik
                const randomRotate = (Math.random() * 10 - 5).toFixed(2);
                polaroid.style.transform = `rotate(${randomRotate}deg)`;
                
                polaroid.innerHTML = `<img src="${src}" alt="Memory ${index}">`;
                polaroid.onclick = () => { triggerSurprise(); };
                wall.appendChild(polaroid);

                // Setiap 4 foto, masukkan quote card
                if ((index + 1) % 4 === 0) {
                    const quoteCard = document.createElement('div');
                    quoteCard.className = 'quote-card';
                    quoteCard.innerText = quotes[Math.floor(Math.random() * quotes.length)];
                    wall.appendChild(quoteCard);
                }
            });
        </script>
    </div>

    <div class="footer">
        Handcrafted with love for Nayla Diana 🕊️
    </div>

    <audio id="bgm" src="bestparpart.m4a" loop></audio>
    <audio id="v1" src="bintang1.m4a"></audio>
    <audio id="v2" src="bintang2.m4a"></audio>
    <audio id="v3" src="bintang3.m4a"></audio>
    <audio id="v4" src="bintang4.m4a"></audio>
    <audio id="v5" src="bintang5.m4a"></audio>

    <script>
        let bgmStarted = false;

        function triggerSurprise() {
            // Start BGM on first click
            if (!bgmStarted) {
                document.getElementById('bgm').play().catch(e => {});
                bgmStarted = true;
            }

            // Play voice note secara acak (1-5)
            const randomVoice = Math.floor(Math.random() * 5) + 1;
            const sound = document.getElementById('v' + randomVoice);
            sound.currentTime = 0;
            sound.play();

            // Efek Hati Betebaran
            for (let i = 0; i < 10; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerText = ['💖', '💗', '💓', '💝'][Math.floor(Math.random() * 4)];
                heart.style.left = (Math.random() * 100) + 'vw';
                heart.style.top = (Math.random() * 80 + 20) + 'vh'; // Hati muncul di area layar
                heart.style.animationDelay = (Math.random() * 0.5) + 's';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 2000);
            }
        }
    </script>
</body>
</html>
